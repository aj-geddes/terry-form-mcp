{% extends "base.html" %}
{% block title %}Configuration - Terry-Form MCP{% endblock %}

{% block content %}
<div class="space-y-6" x-data="{ tab: '{{ active_tab }}' }">
    <!-- Header -->
    <div>
        <h1 class="text-2xl font-bold text-white">Configuration</h1>
        <p class="text-gray-400 text-sm mt-1">Manage server settings, integrations, and credentials</p>
    </div>

    <!-- Tab Navigation -->
    <div class="border-b border-gray-800">
        <nav class="-mb-px flex space-x-6" aria-label="Tabs">
            {% for t in tabs %}
            <button @click="tab='{{ t.id }}'"
                    hx-get="/config/{{ t.id }}"
                    hx-target="#tab-content"
                    hx-swap="innerHTML"
                    :class="tab === '{{ t.id }}'
                        ? 'border-terry-500 text-terry-400'
                        : 'border-transparent text-gray-400 hover:text-gray-300 hover:border-gray-600'"
                    class="whitespace-nowrap border-b-2 py-3 px-1 text-sm font-medium transition-colors">
                {{ t.label }}
            </button>
            {% endfor %}
        </nav>
    </div>

    <!-- Tab Content (initial load rendered server-side, subsequent loads via HTMX) -->
    <div id="tab-content" class="tab-content-enter">
        {{ tab_content }}
    </div>
</div>
{% endblock %}
