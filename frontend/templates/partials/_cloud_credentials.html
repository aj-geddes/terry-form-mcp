<div x-data="{ provider: 'aws' }" class="space-y-6 max-w-2xl">
    <!-- Sub-tab navigation -->
    <div class="flex space-x-2">
        <button @click="provider='aws'"
                :class="provider === 'aws' ? 'bg-gray-700 text-white' : 'bg-gray-900 text-gray-400 hover:text-gray-300'"
                class="text-sm font-medium px-3 py-1.5 rounded-md transition-colors">
            AWS
        </button>
        <button @click="provider='gcp'"
                :class="provider === 'gcp' ? 'bg-gray-700 text-white' : 'bg-gray-900 text-gray-400 hover:text-gray-300'"
                class="text-sm font-medium px-3 py-1.5 rounded-md transition-colors">
            GCP
        </button>
        <button @click="provider='azure'"
                :class="provider === 'azure' ? 'bg-gray-700 text-white' : 'bg-gray-900 text-gray-400 hover:text-gray-300'"
                class="text-sm font-medium px-3 py-1.5 rounded-md transition-colors">
            Azure
        </button>
    </div>

    <!-- AWS -->
    <form x-show="provider === 'aws'" hx-post="/config/cloud-credentials" hx-target="#tab-content" hx-swap="innerHTML"
          class="space-y-6">
        <input type="hidden" name="_provider" value="aws">
        <div class="bg-gray-900 rounded-lg border border-gray-800 p-6 space-y-4">
            <h3 class="text-sm font-medium text-white">AWS Credentials</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="aws_access_key_id" class="block text-sm text-gray-400 mb-1">Access Key ID</label>
                    <input type="text" id="aws_access_key_id" name="aws_access_key_id"
                           value="{{ config.aws.access_key_id or '' }}" placeholder="AKIAIOSFODNN7EXAMPLE">
                </div>
                <div>
                    <label for="aws_secret_access_key" class="block text-sm text-gray-400 mb-1">Secret Access Key</label>
                    <input type="password" id="aws_secret_access_key" name="aws_secret_access_key"
                           placeholder="{{ 'Value is set' if config.aws.secret_access_key else 'Not set' }}"
                           class="{{ 'has-value' if config.aws.secret_access_key }}">
                    {% if config.aws.secret_access_key %}
                    <p class="text-xs text-gray-500 mt-1">Current: {{ config.aws.secret_access_key }}</p>
                    {% endif %}
                </div>
                <div>
                    <label for="aws_session_token" class="block text-sm text-gray-400 mb-1">Session Token</label>
                    <input type="password" id="aws_session_token" name="aws_session_token"
                           placeholder="{{ 'Value is set' if config.aws.session_token else 'Not set' }}"
                           class="{{ 'has-value' if config.aws.session_token }}">
                </div>
                <div>
                    <label for="aws_region" class="block text-sm text-gray-400 mb-1">Default Region</label>
                    <input type="text" id="aws_region" name="aws_region"
                           value="{{ config.aws.region or '' }}" placeholder="us-east-1">
                </div>
            </div>
        </div>
        <div class="flex justify-end">
            <button type="submit"
                    class="bg-terry-600 hover:bg-terry-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
                Save AWS Credentials
            </button>
        </div>
    </form>

    <!-- GCP -->
    <form x-show="provider === 'gcp'" hx-post="/config/cloud-credentials" hx-target="#tab-content" hx-swap="innerHTML"
          class="space-y-6">
        <input type="hidden" name="_provider" value="gcp">
        <div class="bg-gray-900 rounded-lg border border-gray-800 p-6 space-y-4">
            <h3 class="text-sm font-medium text-white">GCP Credentials</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="sm:col-span-2">
                    <label for="gcp_credentials_file" class="block text-sm text-gray-400 mb-1">Credentials File Path</label>
                    <input type="text" id="gcp_credentials_file" name="gcp_credentials_file"
                           value="{{ config.gcp.credentials_file or '' }}" placeholder="/app/config/gcp-sa.json">
                </div>
                <div>
                    <label for="gcp_project" class="block text-sm text-gray-400 mb-1">Project</label>
                    <input type="text" id="gcp_project" name="gcp_project"
                           value="{{ config.gcp.project or '' }}" placeholder="my-project-123">
                </div>
                <div>
                    <label for="gcp_region" class="block text-sm text-gray-400 mb-1">Region</label>
                    <input type="text" id="gcp_region" name="gcp_region"
                           value="{{ config.gcp.region or '' }}" placeholder="us-central1">
                </div>
            </div>
        </div>
        <div class="flex justify-end">
            <button type="submit"
                    class="bg-terry-600 hover:bg-terry-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
                Save GCP Credentials
            </button>
        </div>
    </form>

    <!-- Azure -->
    <form x-show="provider === 'azure'" hx-post="/config/cloud-credentials" hx-target="#tab-content" hx-swap="innerHTML"
          class="space-y-6">
        <input type="hidden" name="_provider" value="azure">
        <div class="bg-gray-900 rounded-lg border border-gray-800 p-6 space-y-4">
            <h3 class="text-sm font-medium text-white">Azure Credentials</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="azure_subscription_id" class="block text-sm text-gray-400 mb-1">Subscription ID</label>
                    <input type="text" id="azure_subscription_id" name="azure_subscription_id"
                           value="{{ config.azure.subscription_id or '' }}" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
                </div>
                <div>
                    <label for="azure_tenant_id" class="block text-sm text-gray-400 mb-1">Tenant ID</label>
                    <input type="text" id="azure_tenant_id" name="azure_tenant_id"
                           value="{{ config.azure.tenant_id or '' }}" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
                </div>
                <div>
                    <label for="azure_client_id" class="block text-sm text-gray-400 mb-1">Client ID</label>
                    <input type="text" id="azure_client_id" name="azure_client_id"
                           value="{{ config.azure.client_id or '' }}" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
                </div>
                <div>
                    <label for="azure_client_secret" class="block text-sm text-gray-400 mb-1">Client Secret</label>
                    <input type="password" id="azure_client_secret" name="azure_client_secret"
                           placeholder="{{ 'Value is set' if config.azure.client_secret else 'Not set' }}"
                           class="{{ 'has-value' if config.azure.client_secret }}">
                    {% if config.azure.client_secret %}
                    <p class="text-xs text-gray-500 mt-1">Current: {{ config.azure.client_secret }}</p>
                    {% endif %}
                </div>
            </div>
        </div>
        <div class="flex justify-end">
            <button type="submit"
                    class="bg-terry-600 hover:bg-terry-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
                Save Azure Credentials
            </button>
        </div>
    </form>
</div>
