<form hx-post="/config/rate-limits" hx-target="#tab-content" hx-swap="innerHTML"
      class="space-y-6 max-w-2xl">

    <div class="bg-gray-900 rounded-lg border border-gray-800 p-6 space-y-4">
        <h3 class="text-sm font-medium text-white">Rate Limits</h3>
        <p class="text-xs text-gray-500">Maximum requests per minute per tool category. Changes apply immediately.</p>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label for="terraform" class="block text-sm text-gray-400 mb-1">Terraform (terry_*, terraform_*)</label>
                <input type="number" id="terraform" name="terraform" value="{{ config.terraform }}" min="1" max="1000">
            </div>

            <div>
                <label for="github" class="block text-sm text-gray-400 mb-1">GitHub (github_*)</label>
                <input type="number" id="github" name="github" value="{{ config.github }}" min="1" max="1000">
            </div>

            <div>
                <label for="tf_cloud" class="block text-sm text-gray-400 mb-1">Terraform Cloud (tf_cloud_*)</label>
                <input type="number" id="tf_cloud" name="tf_cloud" value="{{ config.tf_cloud }}" min="1" max="1000">
            </div>

            <div>
                <label for="default" class="block text-sm text-gray-400 mb-1">Default (all other tools)</label>
                <input type="number" id="default" name="default" value="{{ config.default }}" min="1" max="1000">
            </div>
        </div>
    </div>

    <div class="flex justify-end">
        <button type="submit"
                class="bg-terry-600 hover:bg-terry-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
            Save Rate Limits
        </button>
    </div>
</form>
