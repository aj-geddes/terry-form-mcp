apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: terry-form-mcp
  namespace: terry-form-mcp
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: terry-form-mcp.hvs
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: terry-form-mcp
                port:
                  number: 8000
  tls:
    - hosts:
        - terry-form-mcp.hvs
      secretName: terry-form-mcp-tls
