apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: terry-mcp-server
  labels:
    app: terry-mcp-server
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: terry.example.com  # Replace with your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: terry-mcp-server
            port:
              number: 80