apiVersion: v1
kind: Service
metadata:
  name: terry-mcp-server
  labels:
    app: terry-mcp-server
spec:
  type: ClusterIP
  selector:
    app: terry-mcp-server
  ports:
  - port: 80
    targetPort: 3000
    name: web-ui
  - port: 9090
    targetPort: 9090
    name: mcp
---
apiVersion: v1
kind: Service
metadata:
  name: terry-mcp-server-nodeport
  labels:
    app: terry-mcp-server
spec:
  type: NodePort
  selector:
    app: terry-mcp-server
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30000
    name: web-ui