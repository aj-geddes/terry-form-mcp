apiVersion: apps/v1
kind: Deployment
metadata:
  name: terry-form-mcp
  namespace: terry-form-mcp
  labels:
    app: terry-form-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: terry-form-mcp
  template:
    metadata:
      labels:
        app: terry-form-mcp
    spec:
      containers:
        - name: mcp
          # Production deployments MUST override this with a specific image tag.
          # Using :latest in production is prohibited — pin to a immutable digest or semver tag.
          # Example: image: ghcr.io/your-org/terry-form-mcp:3.1.0
          image: terry-form-mcp:latest  # Override with specific tag in deployment pipeline
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: terry-form-mcp-secrets
          env:
            - name: MCP_TRANSPORT
              value: "streamable-http"
            - name: TERRY_HOST
              value: "0.0.0.0"
            - name: TERRY_PORT
              value: "8000"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: TF_IN_AUTOMATION
              value: "true"
            - name: TF_INPUT
              value: "false"
            - name: CHECKPOINT_DISABLE
              value: "true"
          volumeMounts:
            - name: config-storage
              mountPath: /app/config
            - name: workspace
              mountPath: /mnt/workspace
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            readOnlyRootFilesystem: false  # needs to write to /mnt/workspace and /app/config
            allowPrivilegeEscalation: false
          startupProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 8000
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8000
            periodSeconds: 10
      volumes:
        - name: config-storage
          persistentVolumeClaim:
            claimName: terry-form-config
        - name: workspace
          emptyDir: {}
