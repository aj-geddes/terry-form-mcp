apiVersion: v1
kind: Secret
metadata:
  name: terry-form-mcp-secrets
  namespace: terry-form-mcp
type: Opaque
# stringData values are populated at deploy time via your secret management tool
# (e.g. Sealed Secrets, External Secrets Operator, Vault Agent, kubectl --from-env-file).
# NEVER commit real values to source control.
stringData:
  TERRY_FORM_API_KEY: ""        # Set your API key
  TF_API_TOKEN: ""              # Terraform Cloud token
  GITHUB_APP_ID: ""             # GitHub App ID
  GITHUB_APP_PRIVATE_KEY: ""    # GitHub App private key (PEM)
  GITHUB_APP_WEBHOOK_SECRET: "" # Webhook secret
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  ARM_CLIENT_ID: ""
  ARM_CLIENT_SECRET: ""
