<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Terry-Form MCP{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/css/custom.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        terry: {
                            50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0',
                            300: '#86efac', 400: '#4ade80', 500: '#22c55e',
                            600: '#16a34a', 700: '#15803d', 800: '#166534',
                            900: '#14532d', 950: '#052e16',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full dark"
      hx-headers='{"X-CSRF-Token": "{{ csrf_token }}"}'
      x-data="{ toast: { show: false, message: '', type: 'success' } }"
      @show-toast.window="toast = { show: true, message: $event.detail.message, type: $event.detail.type || 'success' }; setTimeout(() => toast.show = false, 4000)">

    <!-- Navigation -->
    <nav class="bg-gray-900 border-b border-gray-800">
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <div class="flex h-14 items-center justify-between">
                <div class="flex items-center space-x-4">
                    <a href="/" class="flex items-center space-x-2">
                        <span class="text-terry-400 font-bold text-lg">Terry-Form</span>
                        <span class="text-gray-500 text-sm">MCP</span>
                    </a>
                    <span class="text-gray-700">|</span>
                    <a href="/" class="text-sm text-gray-400 hover:text-white {{ 'text-white' if active_page == 'dashboard' else '' }}">Dashboard</a>
                    <a href="/config" class="text-sm text-gray-400 hover:text-white {{ 'text-white' if active_page == 'config' else '' }}">Configuration</a>
                    <a href="/tools" class="text-sm text-gray-400 hover:text-white {{ 'text-white' if active_page == 'tools' else '' }}">Tools</a>
                </div>
                <div class="flex items-center space-x-3">
                    <div hx-get="/api/status/badge" hx-trigger="load, every 10s" hx-swap="innerHTML"
                         class="text-xs">
                        <span class="text-gray-500">Loading...</span>
                    </div>
                    <span class="text-gray-600 text-xs">v{{ version }}</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast Notifications -->
    <div x-show="toast.show"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-2"
         class="fixed bottom-4 right-4 z-50"
         x-cloak>
        <div :class="{
            'bg-green-900 border-green-700 text-green-200': toast.type === 'success',
            'bg-red-900 border-red-700 text-red-200': toast.type === 'error',
            'bg-yellow-900 border-yellow-700 text-yellow-200': toast.type === 'warning'
         }"
             class="rounded-lg border px-4 py-3 shadow-lg text-sm max-w-sm">
            <span x-text="toast.message"></span>
        </div>
    </div>

</body>
</html>
